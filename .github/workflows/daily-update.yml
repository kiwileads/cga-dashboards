name: Update Sales Dashboard

on:
  push:
    paths:
      - '.github/workflows/daily-update.yml'
  schedule:
    # Runs daily at 9pm UTC (5am AWST next day)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pull latest GHL data and rebuild dashboard
        env:
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
        run: node scripts/update-dashboard.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "Auto-update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
